<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">加载中… · suki.live</title>

  <!-- favicon：相对路径 + 404 时静默隐藏 -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico" onerror="this.remove()" />

  <!-- ✅ 添加 marked.js（Markdown 解析器） -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>

  <style>
    :root {
      --bg: #fafbfc;
      --card: #ffffff;
      --text: #2d3748;
      --text-light: #718096;
      --accent: #a7c7e7;
      --accent-soft: #f0f7ff;
      --border: #e2e8f0;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding-bottom: 3rem;
    }

    .header {
      background: linear-gradient(135deg, var(--accent-soft), #f8f9fa);
      padding: 2.5rem 1rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #fff;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      background: #e2e8f0;
    }

    .name {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .tagline {
      color: var(--text-light);
      font-size: 0.95rem;
    }

    .container {
      max-width: 960px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.2rem;
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: #2d3748;
    }

    .card h2::before {
      content: "";
      width: 4px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    .playlist-desc {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      font-style: italic;
    }

    /* ✅ bio 内容左对齐 + marked 输出样式 */
    .bio,
    .bio-content {
      color: var(--text-light);
      font-size: 0.95rem;
      line-height: 1.8;
      text-align: left;
    }

    .bio h1,
    .bio h2,
    .bio h3,
    .bio-content h1,
    .bio-content h2,
    .bio-content h3 {
      text-align: left;
      margin: 1rem 0 0.5rem;
      display: block;
      color: var(--text);
      font-weight: 600;
    }

    .bio p,
    .bio-content p {
      text-align: left;
      margin-bottom: 0.8rem;
    }

    .bio hr,
    .bio-content hr {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 1.2rem 0;
    }

    .bio-content a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }

    .bio-content a:hover {
      color: var(--accent-hover, #8ab4d9);
      text-decoration: underline;
    }

    .bio-content code {
      background: var(--accent-soft);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--text);
    }

    .bio-content pre {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .bio-content blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
      margin: 1rem 0;
      color: var(--text-light);
      font-style: italic;
    }

    .bio-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2rem 0;
      font-size: 0.95rem;
      background: var(--card);
      border-radius: 8px;
      overflow: hidden;
    }

    .bio-content th {
      background: var(--accent-soft);
      padding: 0.8rem 1rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--border);
      color: var(--text);
    }

    .bio-content td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .bio-content tr:last-child td {
      border-bottom: none;
    }

    .bio-content tr:hover {
      background: var(--accent-soft);
    }

    @media (max-width: 640px) {
      .bio-content table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .bio-content th,
      .bio-content td {
        padding: 0.6rem 0.8rem;
        white-space: nowrap;
      }
    }

    /* === 歌单搜索 + 筛选 === */
    .playlist-filters {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-input {
      width: 100%;
      padding: 0.5rem 2rem 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--card);
      color: var(--text);
      transition: border-color 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .search-clear {
      position: absolute;
      right: 0.8rem;
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .search-clear:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .filter-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-select {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .playlist-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .search-tip {
      text-align: center;
      font-style: italic;
      color: var(--text-light);
      font-size: 0.9rem;
      margin: 0.5rem 0;
    }

    /* 权限标签样式 */
    .access-tag {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
      margin-left: 0.4rem;
    }

    .access-免费 {
      background: #c6f6d5;
      color: #22543d;
    }

    .access-付费 {
      background: #fed7d7;
      color: #822727;
    }

    .access-歌切 {
      background: #e9d8fd;
      color: #553c9a;
    }

    .access-舰长专属 {
      background: #bee3f8;
      color: #2a4365;
    }

    .access-提督专属 {
      background: #f6e05e;
      color: #744210;
    }

    .access-总督专属 {
      background: #fbb6ce;
      color: #9b2c2c;
    }

    /* 移动端适配 */
    @media (max-width: 640px) {
      .playlist-filters {
        gap: 0.6rem;
      }

      .filter-group {
        flex-wrap: wrap;
      }

      .filter-select {
        flex: 1;
        min-width: 100px;
        font-size: 0.8rem;
        padding: 0.35rem 0.6rem;
      }

      .playlist-controls {
        flex-direction: column;
        align-items: stretch;
      }

      .view-toggle {
        justify-content: center;
      }
    }

    /* === 歌单控制栏 === */
    .playlist-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .view-toggle {
      display: flex;
      gap: 0.4rem;
    }

    .view-btn {
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text-light);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .view-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a202c;
    }

    .random-btn {
      padding: 0.35rem 0.9rem;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent-soft);
      color: #c2185b;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .random-btn:hover {
      background: var(--accent);
      color: #1a202c;
    }

    /* === 歌单列表视图（默认）=== */
    .playlist {
      list-style: none;
    }

    .playlist.list-view li {
      padding: 0.7rem 0;
      border-bottom: 1px dashed var(--border);
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .playlist.list-view li:last-child {
      border-bottom: none;
    }

    .list-view .song-cover {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      background: #edf2f7;
      flex-shrink: 0;
    }

    /* === 歌单卡片视图 === */
    .playlist.grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.9rem;
    }

    .playlist.grid-view li {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: all 0.2s;
    }

    .playlist.grid-view li:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .grid-view .song-cover {
      width: 100%;
      height: 120px;
      border-radius: 8px;
      object-fit: cover;
      background: #edf2f7;
    }

    .grid-view .song-info {
      flex: 1;
      min-width: 0;
    }

    .grid-view .song-title {
      font-size: 0.95rem;
      margin-bottom: 0.15rem;
    }

    .grid-view .song-meta {
      font-size: 0.8rem;
    }

    .grid-view .song-link {
      margin-top: 0.3rem;
      align-self: flex-start;
    }

    .song-info {
      flex: 1;
      min-width: 0;
    }

    .song-title {
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.2rem;
    }

    .song-meta {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .song-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--accent);
      border-radius: 6px;
      transition: all 0.2s;
      display: inline-block;
    }

    .song-link:hover {
      background: var(--accent);
      color: #1a202c;
    }

    /* === 社交链接 === */
    .social-links {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .social-links a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .social-links a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .social-links a.anonymail {
      background: var(--accent-soft);
      color: #c2185b;
      border-color: var(--accent);
      font-weight: 500;
    }

    /* === 页脚 === */
    .footer-note {
      text-align: center;
      color: var(--text-light);
      font-size: 0.85rem;
      margin-top: 2rem;
    }

    .footer-note a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }

    /* === 加载状态 === */
    .loading {
      text-align: center;
      color: var(--text-light);
      padding: 2rem;
    }

    /* === 随机选歌弹窗 === */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      max-width: 320px;
      width: 90%;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .modal-content h3 {
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 0.8rem;
    }

    .modal-song-title {
      font-size: 1rem;
      color: var(--text-light);
      margin-bottom: 1.2rem;
      padding: 0.8rem;
      background: var(--accent-soft);
      border-radius: 8px;
    }

    .modal-buttons {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }

    .modal-btn {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn-cancel {
      background: var(--card);
      color: var(--text-light);
    }

    .modal-btn-cancel:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .modal-btn-copy {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: #c2185b;
      font-weight: 500;
    }

    .modal-btn-copy:hover {
      background: var(--accent);
      color: #1a202c;
    }

    .modal-btn-play {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a202c;
      font-weight: 500;
    }

    .modal-btn-play:hover {
      background: #8ab4d9;
    }

    /* === 响应式 === */
    @media (max-width: 640px) {
      .header {
        padding: 2rem 1rem 1.5rem;
      }

      .name {
        font-size: 1.2rem;
      }

      .playlist-header {
        flex-direction: column;
        align-items: stretch;
      }

      .view-toggle {
        justify-content: center;
      }

      /* ✅ 卡片视图：手机端一行两个 */
      .playlist.grid-view {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        /* ✅ 强制均分，允许内容收缩 */
        gap: 0.6rem;
      }

      .playlist.grid-view li {
        padding: 0.7rem 0.5rem;
      }

      .grid-view .song-cover {
        height: 90px;
        border-radius: 6px;
      }

      .grid-view .song-title {
        font-size: 0.85rem;
        margin-bottom: 0.1rem;
        overflow-wrap: break-word;
        /* ✅ 防止长文本撑破卡片 */
        word-break: break-all;
        /* ✅ 兼容极端长字符 */
      }

      .grid-view .song-meta {
        font-size: 0.7rem;
      }

      .grid-view .song-link {
        font-size: 0.75rem;
        padding: 0.2rem 0.4rem;
        margin-top: 0.2rem;
      }

      .social-links {
        gap: 0.4rem;
      }

      .social-links a {
        font-size: 0.8rem;
        padding: 0.25rem 0.5rem;
      }
    }

    /* === 歌单点击反馈 === */
    .playlist li {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
    }

    .playlist li:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1) !important;
    }

    /* === 导航栏 === */
    .nav-bar {
      position: sticky;
      top: 1rem;
      z-index: 100;
      display: flex;
      justify-content: center;
      margin: 1rem auto 1.5rem;
      padding: 0.3rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      max-width: fit-content;
    }

    .nav-link {
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-light);
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }

    .nav-link:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .nav-link.active {
      color: #1a202c;
      background: var(--accent);
      box-shadow: 0 2px 6px rgba(167, 199, 231, 0.4);
    }

    @media (max-width: 640px) {
      .nav-bar {
        top: 0.5rem;
        width: 95%;
        border-radius: 8px;
      }

      .nav-link {
        padding: 0.4rem 1rem;
        font-size: 0.9rem;
      }
    }

    /* === 内容区域间距 === */
    .section-anchor {
      scroll-margin-top: 80px;
      /* 适配 sticky 导航栏 */
    }

    /* === 🔹 B站数据统计栏 🔹 === */
    .bili-stats {
      display: none;
      /* ✅ 默认隐藏，JS 提取成功后再显示 */
      justify-content: center;
      gap: 1rem;
      margin: 0.6rem 0 0.3rem;
      flex-wrap: wrap;
    }

    .bili-stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
      padding: 0.2rem 0.4rem;
    }

    .bili-stat-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .bili-stat-label {
      font-size: 0.7rem;
      color: var(--text-light);
      margin-top: 0.15rem;
    }

    .bili-stats .bili-stat-item:hover .bili-stat-value {
      color: var(--accent);
      transition: color 0.2s;
    }

    /* 加载/错误状态 */
    .bili-stat-value.loading {
      color: var(--text-light);
      font-weight: 400;
    }

    .bili-stat-value.error {
      color: #e53e3e;
      font-size: 0.8rem;
    }

    /* 移动端适配 */
    @media (max-width: 640px) {
      .bili-stats {
        gap: 0.6rem;
        margin: 0.4rem 0 0.2rem;
      }

      .bili-stat-value {
        font-size: 0.95rem;
      }

      .bili-stat-label {
        font-size: 0.65rem;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <img id="avatar" class="avatar" src="./avatar.png" alt="avatar" onerror="this.style.display='none'" />
    <div id="name" class="name">加载中…</div>
    <div id="tagline" class="tagline"></div>

    <!-- ✅ 🔹 B站数据统计栏（自动插入）🔹 -->
    <div class="bili-stats" id="bili-stats">
      <div class="bili-stat-item">
        <span class="bili-stat-value loading" id="stat-follower">-</span>
        <span class="bili-stat-label">粉丝</span>
      </div>
      <div class="bili-stat-item">
        <span class="bili-stat-value loading" id="stat-following">-</span>
        <span class="bili-stat-label">关注</span>
      </div>
      <div class="bili-stat-item">
        <span class="bili-stat-value loading" id="stat-views">-</span>
        <span class="bili-stat-label">播放</span>
      </div>
      <div class="bili-stat-item">
        <span class="bili-stat-value loading" id="stat-likes">-</span>
        <span class="bili-stat-label">获赞</span>
      </div>
    </div>

    <div id="social" class="social-links"></div>
  </div>

  <div class="container">
    <!-- ✅ 导航栏（初始隐藏，JS 渲染后显示） -->
    <nav id="main-nav" class="nav-bar" style="display:none;">
      <a href="#section-playlist" class="nav-link" data-target="playlist"
        onclick="switchSection('playlist'); return false;">歌单</a>
      <a href="#section-bio" class="nav-link active" data-target="bio"
        onclick="switchSection('bio'); return false;">简介</a>
    </nav>
    <div id="content">
      <div class="loading">正在加载主播信息…</div>
    </div>
  </div>

  <p class="footer-note">
    托管于 <a href="https://github.com/suki-live/suki-live" target="_blank" rel="noopener">suki-live</a> ·
    <a href="https://suki.live">返回首页</a> ·
    <a href="https://suki.live/registry.html">主播名录</a> ·
    <a href="https://dreamail.cn/" target="_blank" rel="noopener">匿名信</a>
  </p>

  <!-- ✅ 随机选歌弹窗 -->
  <div id="random-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>随机选歌</h3>
      <p class="modal-song-title" id="modal-song-title">歌曲名称</p>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal()">确定</button>
        <button class="modal-btn modal-btn-copy" onclick="copyRandomSong()">复制</button>
        <button class="modal-btn modal-btn-play" onclick="playSelected()">播放</button>
      </div>
    </div>
  </div>

  <script>
    // HTML 转义（防 XSS）
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // 获取主播 ID（子域名）
    const getVtuberId = () => {
      const host = window.location.hostname;
      if (host === 'suki.live' || host === 'www.suki.live') return null;
      return host.split('.')[0];
    };

    const id = getVtuberId();
    const base = id ? '.' : null;

    // 全局变量
    let playlistData = null;
    let currentRandomSong = null;

    // 如果没有有效子域名，显示 404
    if (!id) {
      document.getElementById('content').innerHTML = `
        <div class="card">
          <h2>这片星空暂时无人驻留</h2>
          <p style="color:var(--text-light)">
            你访问的主播主页尚未创建，或链接有误。
          </p>
          <p style="margin-top:1rem">
            <a href="https://suki.live" style="color:var(--accent)">返回首页</a> · 
            <a href="https://github.com/suki-live/suki-live" target="_blank" style="color:var(--accent)">申请创建主页</a>
          </p>
        </div>`;
    } else {
      // ✅ 第一步：只加载 info.json（检查是否启用自定义）
      fetch(`${base}/info.json?t=${Date.now()}`)
        .then(r => {
          if (!r.ok) throw new Error('info.json not found');
          return r.json();
        })
        .then(info => {
          // ========================================
          // ✅ 自定义模式：完全独立，不加载其他文件
          // ========================================
          if (info.use_custom_page === true) {
            const customUrl = `${base}/custom.html?t=${Date.now()}`;

            fetch(customUrl)
              .then(r => {
                if (!r.ok) throw new Error('Custom page not found');
                return r.text();
              })
              .then(html => {
                // ✅ 解析 HTML 字符串
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // ✅ 1. 提取并注入 <head> 中的 <style> 和 <link rel="stylesheet">
                const headStyles = doc.head.querySelectorAll('style, link[rel="stylesheet"]');
                headStyles.forEach(style => {
                  document.head.appendChild(style.cloneNode(true));
                });

                // ✅ 2. 提取 body 内容并替换
                const bodyContent = doc.body.innerHTML;
                document.body.innerHTML = bodyContent;

                // ✅ 3. 执行脚本（重新创建 script 标签）
                const scripts = doc.body.querySelectorAll('script');
                scripts.forEach(oldScript => {
                  const newScript = document.createElement('script');
                  if (oldScript.src) {
                    newScript.src = oldScript.src;
                  } else {
                    newScript.textContent = oldScript.textContent;
                  }
                  document.body.appendChild(newScript);
                });

                if (typeof info !== 'undefined') {
                  tryInitBiliStatsForCustom(info);
                }
              })
              .catch(err => {
                console.warn(`自定义页面未找到: custom.html`, err);
                document.body.innerHTML = `
                  <div style="font-family:sans-serif;max-width:600px;margin:4rem auto;padding:2rem;text-align:center">
                    <h2>主页定制中</h2>
                    <p style="color:#718096">
                      主播 <code>${id}</code> 正在定制专属页面，请稍后再访～
                    </p>
                    <p style="margin-top:1.5rem">
                      <a href="https://suki.live" style="color:#a7c7e7">返回首页</a> · 
                      <a href="https://suki.live/registry.html" style="color:#a7c7e7">查看名录</a>
                    </p>
                  </div>`;
              });

            return; // ✅ 自定义模式结束，不执行默认逻辑
          }

          // ❌ 非自定义模式：加载 playlist.json + 执行默认模板
          return fetch(`${base}/playlist.json?t=${Date.now()}`)
            .then(r => r.ok ? r.json() : Promise.reject('playlist'))
            .then(playlist => {
              renderDefaultTemplate(info, playlist);
            });
        })
        .catch(err => {
          console.error('Load error:', err);
          const missing = err === 'info' ? 'info.json' : 'playlist.json';
          document.getElementById('content').innerHTML = `
            <div class="card">
              <h2>加载失败</h2>
              <p style="color:var(--text-light)">
                文件 <code>${missing}</code> 未找到。<br/>
                主播 <code>${id}</code> 的配置可能尚未完成。
              </p>
              <p style="margin-top:1rem">
                <a href="https://suki.live" style="color:var(--accent)">返回首页</a> · 
                <a href="https://github.com/suki-live/suki-live" target="_blank" style="color:var(--accent)">查看注册指南</a>
              </p>
            </div>`;
        });
    }

    // ========================================
    // ✅ 默认模板渲染函数
    // ========================================
    function renderDefaultTemplate(info, playlist) {
      // ✅ 关键：赋值给全局变量，供 playRandom 使用
      playlistData = playlist;

      // 渲染基本信息
      document.title = `${info.name} · suki.live`;
      document.getElementById('page-title').textContent = `${info.name} · suki.live`;
      document.getElementById('name').textContent = info.name;
      document.getElementById('tagline').textContent = info.tagline || '';

      // 社交链接 + 匿名信按钮
      const socialEl = document.getElementById('social');
      if (Array.isArray(info.social) && info.social.length) {
        info.social.forEach(item => {
          if (item.label && item.url) {
            socialEl.innerHTML += `
              <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">
                ${escapeHtml(item.label)}
              </a>`;
          }
        });
      }
      if (info.anonymail) {
        socialEl.innerHTML += `
          <a href="${escapeHtml(info.anonymail)}" target="_blank" rel="noopener" class="anonymail">
            匿名信
          </a>`;
      }

      // 组装页面内容
      let html = '';

      // 歌单
      if (info.show_playlist !== false && playlist.items?.length) {
        html += `
          <div class="card section-anchor" id="section-playlist">
            <h2>${playlist.title || '推荐歌单'}</h2>
            <!-- 搜索栏 + 筛选器 -->
            <div class="playlist-filters">
              <!-- 搜索框 -->
              <div class="search-box">
                <input type="text" id="song-search" class="search-input" placeholder="搜索歌名/歌手/曲风..." oninput="filterSongs()">
                <button class="search-clear" onclick="clearSearch()">✕</button>
              </div>
              <!-- 筛选下拉框 -->
              <div class="filter-group">
                <select id="filter-language" class="filter-select" onchange="filterSongs()">
                  <option value="">全部语言</option>
                  <option value="中文">中文</option>
                  <option value="日文">日文</option>
                  <option value="英文">英文</option>
                  <option value="西语">西语</option>
                  <option value="法语">法语</option>
                  <option value="其他">其他</option>
                </select>
                <select id="filter-genre" class="filter-select" onchange="filterSongs()">
                  <option value="">全部曲风</option>
                  <option value="动漫">动漫</option>
                  <option value="二次元">二次元</option>
                  <option value="VOCALOID">VOCALOID</option>
                  <option value="VTuber">VTuber</option>
                  <option value="流行">流行</option>
                  <option value="J-POP">J-POP</option>
                  <option value="电子">电子</option>
                  <option value="治愈系">治愈系</option>
                  <option value="摇滚">摇滚</option>
                  <option value="古风">古风</option>
                  <option value="其他">其他</option>
                </select>
                <select id="filter-access" class="filter-select" onchange="filterSongs()">
                  <option value="">全部权限</option>
                  <option value="免费">免费</option>
                  <option value="付费">付费</option>
                  <option value="歌切">歌切</option>
                  <option value="舰长专属">舰长专属</option>
                  <option value="提督专属">提督专属</option>
                  <option value="总督专属">总督专属</option>
                </select>
              </div>
              <!-- 视图切换 + 随机选歌 -->
              <div class="playlist-controls">
                <div class="view-toggle">
                  <button class="view-btn active" data-view="list" onclick="switchView('list')">列表</button>
                  <button class="view-btn" data-view="grid" onclick="switchView('grid')">卡片</button>
                </div>
                <button class="random-btn" onclick="playRandom()">随机选歌</button>
              </div>
            </div>
            ${playlist.description ? `<p class="playlist-desc">${playlist.description}</p>` : ''}
            <ul class="playlist list-view" id="playlist-container">
              ${renderPlaylist(playlist.items, 'list')}
            </ul>
            <!-- 搜索结果提示 -->
            <p id="search-result-tip" class="search-tip" style="display:none;"></p>
          </div>`;
      }

      // 自我介绍
      if (info.bio) {
        html += `
          <div class="card section-anchor" id="section-bio">
            <h2>关于我</h2>
            <div class="bio" id="bio-content">加载中…</div>
          </div>`;
      }

      document.getElementById('content').innerHTML = html;
      // ✅ 在 renderDefaultTemplate 末尾调用
      // 找到这行: document.getElementById('content').innerHTML = html;
      // 在下面添加:
      document.getElementById('main-nav').style.display = 'flex';  // 显示导航栏
      setTimeout(initNavScrollSpy, 100);  // 初始化滚动监听

      // ✅ 关键修复：渲染完成后立即恢复用户视图偏好
      restorePlaylistView();

      // 加载 bio.md（使用 marked.js 解析）
      if (info.bio) {
        fetch(`${base}/bio.md?t=${Date.now()}`)
          .then(r => r.text())
          .then(md => {
            // ✅ 等待 marked 加载完成
            if (typeof marked === 'undefined') {
              return new Promise(resolve => {
                const check = () => {
                  if (typeof marked !== 'undefined') resolve(marked.parse(md));
                  else setTimeout(check, 50);
                };
                check();
              });
            }
            return marked.parse(md);
          })
          .then(html => {
            // ✅ 安全处理链接（只允许 http/https/# 开头）
            const safeHtml = html.replace(/href="([^"]+)"/g, (match, url) => {
              if (!/^https?:\/\//.test(url) && !url.startsWith('#')) {
                return 'href="#" onclick="return false"';
              }
              return match;
            });
            document.getElementById('bio-content').innerHTML = `<div class="bio-content">${safeHtml}</div>`;
          })
          .catch(() => {
            const bioCard = document.querySelector('.card h2:nth-child(1)')?.closest('.card');
            if (bioCard) bioCard.remove();
          });
      }

      initBiliStatsFromInfo(info);
    }

    // ========================================
    // ✅ 恢复用户视图偏好（确保在歌单渲染后执行）
    // ========================================
    function restorePlaylistView() {
      const savedView = localStorage.getItem('suki_playlist_view');
      const container = document.getElementById('playlist-container');

      // ✅ 确保：有保存的偏好 + 不是默认列表 + 容器存在 + 歌单数据存在
      if (savedView && savedView !== 'list' && container && playlistData?.items) {
        switchView(savedView);  // ✅ 直接调用，无需 setTimeout
      }
    }

    // ========================================
    // ✅ 歌单渲染函数
    // ========================================
    function renderPlaylist(items, viewMode) {
      // ✅ 先过滤：搜索 + 筛选
      const filteredItems = filterSongsLogic(items);

      if (viewMode === 'grid') {
        return filteredItems.map(song => `
          <li onclick="copySongTitle('${escapeHtml(song.title)}')" style="cursor: pointer;" title="点击复制「点歌 ${escapeHtml(song.title)}」">
            ${song.cover ? `<img class="song-cover" src="${song.cover}" alt="${escapeHtml(song.title)}" onerror="this.style.display='none'"/>` : ''}
            <div class="song-info">
              <div class="song-title">
                ${escapeHtml(song.title)}
                ${song.access ? `<span class="access-tag access-${escapeHtml(song.access)}">${escapeHtml(song.access)}</span>` : ''}
              </div>
              <div class="song-meta">
                ${escapeHtml(song.artist || '')}${song.artist && song.source ? ' · ' : ''}${escapeHtml(song.source || '')}
                ${song.language || song.genre ? `<br/>${song.language || ''}${song.language && song.genre ? ' · ' : ''}${song.genre || ''}` : ''}
              </div>
            </div>
            <div class="song-actions">
              ${song.url ? `<a class="song-link" href="${escapeHtml(song.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶️ 播放</a>` : ''}
            </div>
          </li>
        `).join('');
      } else {
        return filteredItems.map(song => `
          <li onclick="copySongTitle('${escapeHtml(song.title)}')" style="cursor: pointer;" title="点击复制「点歌 ${escapeHtml(song.title)}」">
            ${song.cover ? `<img class="song-cover" src="${song.cover}" alt="${escapeHtml(song.title)}" onerror="this.style.display='none'"/>` : ''}
            <div class="song-info">
              <div class="song-title">
                ${escapeHtml(song.title)}
                ${song.access ? `<span class="access-tag access-${escapeHtml(song.access)}">${escapeHtml(song.access)}</span>` : ''}
              </div>
              <div class="song-meta">
                ${escapeHtml(song.artist || '')}${song.artist && song.source ? ' · ' : ''}${escapeHtml(song.source || '')}
                ${song.added_at ? ` · 添加于 ${song.added_at}` : ''}
                ${song.language || song.genre ? `<br/>${song.language || ''}${song.language && song.genre ? ' · ' : ''}${song.genre || ''}` : ''}
              </div>
            </div>
            ${song.url ? `<a class="song-link" href="${escapeHtml(song.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">播放</a>` : ''}
          </li>
        `).join('');
      }
    }

    // ========================================
    // ✅ 复制歌曲名到剪贴板
    // ========================================
    function copySongTitle(title) {
      const text = `点歌 ${title}`;
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(() => showCopyToast(`已复制：${text}`))
          .catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    // 降级复制方案
    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      try {
        document.execCommand('copy');
        showCopyToast(`已复制：${text}`);
      } catch (err) {
        showCopyToast('复制失败，请手动复制');
      }
      document.body.removeChild(textarea);
    }

    // 显示复制提示（Toast）
    function showCopyToast(message) {
      const existing = document.getElementById('copy-toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.id = 'copy-toast';
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--card);
        color: var(--text);
        padding: 0.8rem 1.5rem;
        border-radius: 30px;
        box-shadow: var(--shadow);
        font-size: 0.9rem;
        z-index: 10000;
        animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
      `;
      document.body.appendChild(toast);

      if (!document.getElementById('toast-style')) {
        const style = document.createElement('style');
        style.id = 'toast-style';
        style.textContent = `
          @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
          }
          @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
          }
        `;
        document.head.appendChild(style);
      }
      setTimeout(() => toast.remove(), 2500);
    }

    // ========================================
    // ✅ 视图切换函数
    // ========================================
    function switchView(viewMode) {
      const container = document.getElementById('playlist-container');
      if (!container) return;  // ✅ 空值检查

      const buttons = document.querySelectorAll('.view-btn');
      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === viewMode);
      });

      container.classList.remove('list-view', 'grid-view');
      container.classList.add(viewMode === 'grid' ? 'grid-view' : 'list-view');

      if (playlistData?.items) {
        container.innerHTML = renderPlaylist(playlistData.items, viewMode);
      }

      localStorage.setItem('suki_playlist_view', viewMode);
    }

    // ========================================
    // ✅ 随机选歌：显示弹窗
    // ========================================
    function playRandom() {
      if (!playlistData?.items?.length) {
        alert('暂无可播放的歌曲～');
        return;
      }
      const randomIndex = Math.floor(Math.random() * playlistData.items.length);
      currentRandomSong = playlistData.items[randomIndex];
      document.getElementById('modal-song-title').textContent = currentRandomSong.title;
      document.getElementById('random-modal').style.display = 'flex';
    }

    // ========================================
    // ✅ 关闭弹窗
    // ========================================
    function closeModal() {
      document.getElementById('random-modal').style.display = 'none';
      currentRandomSong = null;
    }

    // ========================================
    // ✅ 播放选中的歌曲
    // ========================================
    function playSelected() {
      if (!currentRandomSong) { closeModal(); return; }
      if (!currentRandomSong?.url) {
        alert(`"${currentRandomSong.title}" 暂无播放链接～`);
        closeModal();
        return;
      }
      window.open(currentRandomSong.url, '_blank', 'noopener,noreferrer');
      closeModal();
      const btn = document.querySelector('.random-btn');
      const originalText = btn.textContent;
      btn.textContent = `已播放`;
      btn.style.background = '#c6f6d5';
      btn.style.color = '#22543d';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = '';
        btn.style.color = '';
      }, 2000);
    }

    // ========================================
    // ✅ 复制随机选中的歌曲名
    // ========================================
    function copyRandomSong() {
      if (!currentRandomSong?.title) {
        showCopyToast('暂无可复制的歌曲');
        return;
      }
      const text = `点歌 ${currentRandomSong.title}`;
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(() => {
            showCopyToast(`已复制：${text}`);
            setTimeout(() => closeModal(), 800);
          })
          .catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    // ========================================
    // ✅ 搜索 + 筛选逻辑
    // ========================================
    function filterSongsLogic(items) {
      const searchText = document.getElementById('song-search')?.value?.toLowerCase().trim() || '';
      const filterLang = document.getElementById('filter-language')?.value || '';
      const filterGenre = document.getElementById('filter-genre')?.value || '';
      const filterAccess = document.getElementById('filter-access')?.value || '';

      return items.filter(song => {
        const matchSearch = !searchText ||
          song.title?.toLowerCase().includes(searchText) ||
          song.artist?.toLowerCase().includes(searchText) ||
          song.genre?.toLowerCase().includes(searchText) ||
          song.language?.toLowerCase().includes(searchText);
        const matchLang = !filterLang || song.language === filterLang;
        const matchGenre = !filterGenre || song.genre === filterGenre;
        const matchAccess = !filterAccess || song.access === filterAccess;
        return matchSearch && matchLang && matchGenre && matchAccess;
      });
    }

    // ✅ 执行筛选并重新渲染
    function filterSongs() {
      if (!playlistData?.items) return;
      const container = document.getElementById('playlist-container');
      const viewMode = container?.classList.contains('grid-view') ? 'grid' : 'list';
      const filtered = filterSongsLogic(playlistData.items);

      if (container) {
        container.innerHTML = renderPlaylist(playlistData.items, viewMode);
      }

      const tip = document.getElementById('search-result-tip');
      if (tip) {
        const total = playlistData.items.length;
        const shown = filtered.length;
        if (shown < total || document.getElementById('song-search')?.value) {
          tip.style.display = 'block';
          tip.textContent = `找到 ${shown} / ${total} 首歌曲`;
        } else {
          tip.style.display = 'none';
        }
      }
    }

    // ✅ 清空搜索
    function clearSearch() {
      const input = document.getElementById('song-search');
      if (input) {
        input.value = '';
        filterSongs();
        input.focus();
      }
    }

    // ========================================
    // ✅ 导航栏切换功能
    // ========================================
    function switchSection(target) {
      // 更新激活状态
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.target === target);
      });

      // 平滑滚动到目标区域
      const section = document.getElementById(`section-${target}`);
      if (section) {
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // ✅ 滚动监听：自动高亮当前区块
    function initNavScrollSpy() {
      const sections = ['playlist', 'bio'].map(id => document.getElementById(`section-${id}`)).filter(Boolean);
      if (!sections.length) return;

      const navLinks = document.querySelectorAll('.nav-link');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id.replace('section-', '');
            navLinks.forEach(link => {
              link.classList.toggle('active', link.dataset.target === id);
            });
          }
        });
      }, { rootMargin: '-40% 0px -55% 0px', threshold: 0 });

      sections.forEach(sec => observer.observe(sec));
    }

    // ========================================
    // ✅ 🔹 函数 1：从 B站链接提取 UID 🔹
    // ========================================
    function extractBiliMid(url) {
      if (!url) return null;
      const cleanUrl = url.trim();

      // 支持多种 B站空间链接格式
      const patterns = [
        /space\.bilibili\.com\/(\d+)/,      // https://space.bilibili.com/123456
        /bilibili\.com\/space\/(\d+)/,      // 备用格式
        /mid[=:](\d+)/,                      // 带参数格式
      ];

      for (const pattern of patterns) {
        const match = cleanUrl.match(pattern);
        if (match?.[1]) return match[1];
      }
      return null;  // ❌ 匹配失败返回 null
    }

    // ========================================
    // ✅ 获取并渲染 B 站统计数据
    // ========================================
    function fetchBiliStats(mid) {
      const statsEl = document.getElementById('bili-stats');
      if (!mid || !statsEl) {
        if (statsEl) statsEl.style.display = 'none';
        return;
      }

      const WORKER_PROXY = 'https://suki-live.sunnycherry2023.workers.dev/?url=';

      const fmt = (num) => {
        if (num === undefined || num === null) return '-';
        return Number(num).toLocaleString('zh-CN');
      };

      const hideOnError = () => {
        if (statsEl) statsEl.style.display = 'none';
      };

      // ✅ 并行请求两个接口
      Promise.all([
        fetch(`${WORKER_PROXY}${encodeURIComponent(`https://api.bilibili.com/x/relation/stat?vmid=${mid}`)}`)
          .then(async r => {
            if (!r.ok) return null;
            const text = await r.text();
            try { return JSON.parse(text); } catch (e) { return null; }
          }),
        fetch(`${WORKER_PROXY}${encodeURIComponent(`https://api.bilibili.com/x/space/upstat?mid=${mid}`)}`)
          .then(async r => {
            if (!r.ok) return null;
            const text = await r.text();
            try { return JSON.parse(text); } catch (e) { return null; }
          })
      ])
        .then(([relationResp, upstatResp]) => {
          // ✅ 提取 data 字段
          const relationData = relationResp?.data || null;
          const upstatData = upstatResp?.data || null;

          // ✅ 至少有一个成功就显示统计栏
          if (!relationData && !upstatData) {
            hideOnError();
            return;
          }

          // ✅ 显示统计栏
          statsEl.style.display = 'flex';

          // 🔹 渲染粉丝数
          if (relationData?.follower !== undefined) {
            document.getElementById('stat-follower').textContent = fmt(relationData.follower);
            document.getElementById('stat-follower').classList.remove('loading');
          }
          // 🔹 渲染关注数
          if (relationData?.following !== undefined) {
            document.getElementById('stat-following').textContent = fmt(relationData.following);
            document.getElementById('stat-following').classList.remove('loading');
          }
          // 🔹 渲染播放数（视频 + 文章）
          if (upstatData) {
            const videoViews = upstatData.archive?.view ?? 0;
            const articleViews = upstatData.article?.view ?? 0;
            const totalViews = videoViews + articleViews;
            document.getElementById('stat-views').textContent = fmt(totalViews);
            document.getElementById('stat-views').classList.remove('loading');
          }
          // 🔹 渲染获赞数（✅ 多层兼容解析）
          if (upstatData) {
            // 尝试多种路径获取 likes
            let likes = null;
            if (typeof upstatData.likes === 'number') {
              likes = upstatData.likes;                    // ✅ 路径 1: data.likes
            } else if (typeof upstatData?.archive?.likes === 'number') {
              likes = upstatData.archive.likes;            // 路径 2: data.archive.likes
            } else if (typeof upstatResp?.likes === 'number') {
              likes = upstatResp.likes;                    // 路径 3: 根级别 likes
            }

            // ✅ 有值才显示，否则显示 0
            if (likes !== null && likes >= 0) {
              document.getElementById('stat-likes').textContent = fmt(likes);
            } else {
              document.getElementById('stat-likes').textContent = '0';
            }
            document.getElementById('stat-likes').classList.remove('loading');
          }

          // ✅ 调试日志（生产环境可删除）
          console.log('🔍 B 站数据解析:', {
            relationData,
            upstatData,
            likes: upstatData?.likes,
            upstatResp
          });
        })
        .catch(err => {
          console.warn('B 站数据获取异常:', err);
          hideOnError();
        });
    }

    // ========================================
    // ✅ 🔹 函数 3：初始化 B站数据（核心入口）🔹
    // ========================================
    function initBiliStatsFromInfo(info) {
      const statsEl = document.getElementById('bili-stats');

      // ✅ 先确保默认隐藏（防止闪烁）
      if (statsEl) statsEl.style.display = 'none';

      if (!info?.social || !Array.isArray(info.social)) return;

      // 🔍 查找 B站链接（支持 "B站" / "bilibili" 等标签）
      const biliLink = info.social.find(item =>
        item.label?.toLowerCase().includes('b站') ||
        item.label?.toLowerCase().includes('bilibili')
      );

      // ❌ 没找到 B站链接 → 隐藏并返回
      if (!biliLink?.url) {
        if (statsEl) statsEl.style.display = 'none';
        return;
      }

      // 🔍 提取 UID
      const mid = extractBiliMid(biliLink.url);

      // ❌ 提取失败 → 隐藏并返回
      if (!mid) {
        console.warn('无法从链接提取 B站 UID:', biliLink.url);
        if (statsEl) statsEl.style.display = 'none';
        return;
      }

      // ✅ UID 有效 → 显示统计栏 + 请求数据
      if (statsEl) statsEl.style.display = 'flex';
      setTimeout(() => fetchBiliStats(mid), 300);  // 延迟确保 DOM 已渲染
    }

    // ========================================
    // ✅ 🔹 函数 4：自定义页面也支持（可选）🔹
    // ========================================
    function tryInitBiliStatsForCustom(info) {
      // 自定义页面如果也包含 #bili-stats 元素，同样初始化
      if (info?.social && document.getElementById('bili-stats')) {
        setTimeout(() => initBiliStatsFromInfo(info), 500);
      }
    }
  </script>
