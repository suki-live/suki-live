<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">加载中… · suki.live</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" onerror="this.remove()" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <style>
        :root {
            --bg: #fafbfc;
            --card: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --accent: #a7c7e7;
            --accent-soft: #f0f7ff;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            background-image: var(--body-bg, none);
            background-size: var(--body-bg-size, cover);
            background-position: var(--body-bg-position, center);
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 3rem;
        }

        .header {
            background: var(--header-bg, linear-gradient(135deg, var(--accent-soft), #f8f9fa));
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 2.5rem 1rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
            background: #e2e8f0;
        }

        .name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .tagline {
            color: var(--text-light);
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 0.3rem 0.8rem;
            display: inline-block;
            margin-top: 0.3rem;
            backdrop-filter: blur(4px);
        }

        .container {
            max-width: 960px;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #2d3748;
        }

        .card h2::before {
            content: "";
            width: 4px;
            height: 14px;
            background: var(--accent);
            border-radius: 2px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        /* ✅ bio 内容样式 - 左对齐 */
        .bio,
        .bio-content {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.8;
            text-align: left;
        }

        .bio-content h1,
        .bio-content h2,
        .bio-content h3,
        .bio-content h4 {
            text-align: left;
            margin: 1rem 0 0.5rem;
            color: var(--text);
            font-weight: 600;
        }

        .bio-content p {
            text-align: left;
            margin-bottom: 0.8rem;
        }

        .bio-content hr {
            border: none;
            border-top: 1px dashed var(--border);
            margin: 1.2rem 0;
        }

        .bio-content a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        .bio-content a:hover {
            color: var(--accent-hover, #8ab4d9);
            text-decoration: underline;
        }

        .bio-content code {
            background: var(--accent-soft);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--text);
        }

        .bio-content pre {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .bio-content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-light);
            font-style: italic;
        }

        .bio-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.2rem 0;
            font-size: 0.95rem;
            background: var(--card);
            border-radius: 8px;
            overflow: hidden;
        }

        .bio-content th {
            background: var(--accent-soft);
            padding: 0.8rem 1rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
            color: var(--text);
        }

        .bio-content td {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        .bio-content tr:last-child td {
            border-bottom: none;
        }

        .bio-content tr:hover {
            background: var(--accent-soft);
        }

        @media (max-width: 640px) {
            .bio-content table {
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .bio-content th,
            .bio-content td {
                padding: 0.6rem 0.8rem;
                white-space: nowrap;
            }
        }

        /* === 社交链接 === */
        .social-links {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.3rem 0.7rem;
            border: 1px solid rgba(226, 232, 240, 0.6);
            border-radius: 20px;
            transition: all 0.2s;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
        }

        .social-links a:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(255, 255, 255, 0.9);
        }

        /* === 页脚 === */
        .footer-note {
            text-align: center;
            color: var(--text-light);
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        .footer-note a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* === 加载状态 === */
        .loading {
            text-align: center;
            color: var(--text-light);
            padding: 2rem;
        }

        /* === 响应式 === */
        @media (max-width: 640px) {
            .header {
                padding: 2rem 1rem 1.5rem;
            }

            .name {
                font-size: 1.2rem;
            }

            .social-links {
                gap: 0.4rem;
            }

            .social-links a {
                font-size: 0.8rem;
                padding: 0.25rem 0.5rem;
            }
        }

        /* === 🔹 目录功能样式 🔹 === */
        /* 电脑端：右侧悬浮目录 */
        .toc-sidebar {
            position: fixed;
            right: 20px;
            left: auto;
            top: 50%;
            transform: translateY(-50%);
            max-height: 80vh;
            overflow-y: auto;
            padding: 1rem 0.8rem;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow);
            z-index: 90;
            display: none;
            min-width: 160px;
            backdrop-filter: blur(4px);
        }

        .toc-sidebar.visible {
            display: block;
        }

        .toc-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.6rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
            text-align: right;
        }

        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.8rem;
        }

        .toc-item {
            margin: 0.3rem 0;
        }

        .toc-link {
            color: var(--text-light);
            text-decoration: none;
            display: block;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: right;
        }

        .toc-link:hover,
        .toc-link.active {
            color: var(--accent);
            background: var(--accent-soft);
        }

        .toc-link.level-2 {
            padding-left: 0;
            font-weight: 500;
        }

        .toc-link.level-3 {
            padding-left: 0.8rem;
        }

        .toc-link.level-4 {
            padding-left: 1.4rem;
            font-size: 0.75rem;
        }

        /* 手机端：左下角目录按钮 + 弹窗 */
        .toc-toggle-btn {
            position: fixed;
            left: 16px;
            bottom: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            color: #1a202c;
            border: none;
            box-shadow: var(--shadow);
            cursor: pointer;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .toc-toggle-btn:hover {
            transform: scale(1.05);
            background: var(--accent-hover, #8ab4d9);
        }

        .toc-toggle-btn.visible {
            display: flex;
        }

        /* 手机端目录弹窗 */
        .toc-modal {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            max-height: 60vh;
            background: var(--card);
            border-radius: 16px 16px 0 0;
            padding: 1.2rem 1rem;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            z-index: 101;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .toc-modal.visible {
            display: block;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .toc-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
        }

        .toc-modal-header h4 {
            font-size: 1rem;
            color: var(--text);
            margin: 0;
        }

        .toc-modal-close {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--text-light);
            cursor: pointer;
            padding: 0.2rem;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .toc-modal-close:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .toc-modal .toc-list {
            max-height: 40vh;
            overflow-y: auto;
        }

        .toc-modal .toc-link {
            padding: 0.4rem 0.6rem;
        }

        /* 目录遮罩层（手机端） */
        .toc-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 100;
            display: none;
        }

        .toc-overlay.visible {
            display: block;
        }

        /* 响应式：手机端隐藏电脑端目录 */
        @media (max-width: 768px) {
            .toc-sidebar {
                display: none !important;
            }

            .toc-toggle-btn {
                display: none;
            }
        }

        @media (min-width: 769px) {

            .toc-toggle-btn,
            .toc-modal,
            .toc-overlay {
                display: none !important;
            }
        }

        /* 简介内容添加目录锚点偏移 */
        #section-bio .bio-content h2,
        #section-bio .bio-content h3,
        #section-bio .bio-content h4 {
            scroll-margin-top: 100px;
        }

        /* === 🔹 电脑端目录折叠功能 🔹 === */
        .toc-sidebar .toc-toggle-btn {
            position: absolute;
            left: 8px;
            right: auto;
            top: 8px;
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            transition: all 0.2s;
            line-height: 1;
        }

        .toc-sidebar .toc-toggle-btn:hover {
            color: var(--accent);
            background: var(--accent-soft);
        }

        .toc-sidebar.collapsed {
            min-width: 44px !important;
            padding: 0.8rem 0.4rem !important;
            cursor: pointer;
        }

        .toc-sidebar.collapsed .toc-title {
            display: none;
        }

        .toc-sidebar.collapsed .toc-list {
            display: none;
        }

        .toc-sidebar.collapsed .toc-toggle-btn {
            position: static;
            transform: none;
            font-size: 1.1rem;
            padding: 0.3rem;
        }

        .toc-sidebar .toc-toggle-btn::after {
            content: "▶";
            display: inline-block;
            transition: transform 0.2s;
        }

        .toc-sidebar.collapsed .toc-toggle-btn::after {
            content: "◀";
            transform: rotate(0deg);
        }

        .toc-sidebar.collapsed:hover::before {
            content: "目录";
            position: absolute;
            right: 100%;
            left: auto;
            top: 50%;
            transform: translateY(-50%);
            margin-right: 8px;
            margin-left: 0;
            padding: 0.3rem 0.6rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text);
            white-space: nowrap;
            box-shadow: var(--shadow);
            z-index: 95;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <img id="avatar" class="avatar" src="./avatar.png" alt="avatar" onerror="this.style.display='none'" />
        <div id="name" class="name">加载中…</div>
        <div id="tagline" class="tagline"></div>
        <div id="social" class="social-links"></div>
    </div>
    <div class="container">
        <div id="content">
            <div class="loading">正在加载主播信息…</div>
        </div>
    </div>
    <p class="footer-note">
        托管于 <a href="https://github.com/suki-live/suki-live" target="_blank" rel="noopener">suki-live</a> ·
        <a href="https://suki.live">返回首页</a> ·
        <a href="https://suki.live/registry.html">主播名录</a>
    </p>

    <script>
        // HTML 转义（防 XSS）
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // 获取主播 ID（子域名）
        const getVtuberId = () => {
            const host = window.location.hostname;
            if (host === 'suki.live' || host === 'www.suki.live') return null;
            return host.split('.')[0];
        };
        const id = getVtuberId();
        const base = id ? '.' : null;

        // 如果没有有效子域名，显示 404
        if (!id) {
            document.getElementById('content').innerHTML = `
    <div class="card">
      <h2>这片星空暂时无人驻留</h2>
      <p style="color:var(--text-light)">
        你访问的主播主页尚未创建，或链接有误。
      </p>
      <p style="margin-top:1rem">
        <a href="https://suki.live" style="color:var(--accent)">返回首页</a> ·
        <a href="https://github.com/suki-live/suki-live" target="_blank" style="color:var(--accent)">申请创建主页</a>
      </p>
    </div>`;
        } else {
            // 加载 info.json
            fetch(`${base}/info.json?t=${Date.now()}`)
                .then(r => { if (!r.ok) throw new Error('info.json not found'); return r.json(); })
                .then(info => {
                    // 渲染基本信息
                    document.title = `${info.name} · suki.live`;
                    document.getElementById('page-title').textContent = `${info.name} · suki.live`;
                    document.getElementById('name').textContent = info.name;
                    document.getElementById('tagline').textContent = info.tagline || '';

                    // 社交链接
                    const socialEl = document.getElementById('social');
                    if (Array.isArray(info.social) && info.social.length) {
                        info.social.forEach(item => {
                            if (item.label && item.url) {
                                socialEl.innerHTML += `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(item.label)}</a>`;
                            }
                        });
                    }

                    // 渲染 bio 卡片
                    if (info.bio) {
                        document.getElementById('content').innerHTML = `
          <div class="card" id="section-bio">
            <h2>关于我</h2>
            <div class="bio" id="bio-content">加载中…</div>
          </div>`;

                        // 加载 bio.md
                        fetch(`${base}/bio.md?t=${Date.now()}`)
                            .then(r => r.text())
                            .then(md => {
                                if (typeof marked === 'undefined') {
                                    return new Promise(resolve => {
                                        const check = () => {
                                            if (typeof marked !== 'undefined') resolve(marked.parse(md));
                                            else setTimeout(check, 50);
                                        };
                                        check();
                                    });
                                }
                                return marked.parse(md);
                            })
                            .then(html => {
                                // 安全处理链接
                                const safeHtml = html.replace(/href="([^"]+)"/g, (match, url) => {
                                    if (!/^https?:\/\//.test(url) && !url.startsWith('#')) {
                                        return 'href="#" onclick="return false"';
                                    }
                                    return match;
                                });
                                document.getElementById('bio-content').innerHTML = `<div class="bio-content">${safeHtml}</div>`;

                                // 初始化目录功能
                                if (info.toc?.enabled) {
                                    setTimeout(() => initToc(info, safeHtml), 100);
                                }
                            })
                            .catch(() => {
                                document.getElementById('bio-content').innerHTML = '<p style="color:var(--text-light)">简介加载失败～</p>';
                            });
                    }

                    // 背景图支持（可选）
                    if (info.show_header_bg === true) setupHeaderBackground();
                    if (info.show_body_bg === true) setupBodyBackground();
                })
                .catch(err => {
                    console.error('Load error:', err);
                    document.getElementById('content').innerHTML = `
        <div class="card">
          <h2>加载失败</h2>
          <p style="color:var(--text-light)">配置文件未找到，主播可能尚未完成设置。</p>
        </div>`;
                });
        }

        // 背景图函数（可选）
        function setupHeaderBackground() {
            const isMobile = window.innerWidth <= 640;
            const apply = (url) => {
                document.documentElement.style.setProperty('--header-bg', `url(${url})`);
                const header = document.querySelector('.header');
                if (header) { header.style.textShadow = '0 1px 4px rgba(0,0,0,0.25)'; }
            };
            const check = (url) => fetch(url, { method: 'HEAD' }).then(r => r.ok ? url : null).catch(() => null);
            const load = () => {
                const mobile = `/head_bg_mobile.png?t=${Date.now()}`, desktop = `/head_bg.png?t=${Date.now()}`;
                if (isMobile) {
                    check(mobile).then(f => f ? apply(f) : check(desktop).then(f => f && apply(f)));
                } else { check(desktop).then(f => f && apply(f)); }
            };
            load();
            let t; window.addEventListener('resize', () => {
                clearTimeout(t); t = setTimeout(() => {
                    if ((window.innerWidth <= 640) !== isMobile) load();
                }, 250);
            });
        }
        function setupBodyBackground() {
            const isMobile = window.innerWidth <= 640;
            const apply = (url) => {
                document.documentElement.style.setProperty('--body-bg', `url(${url})`);
                document.documentElement.style.setProperty('--body-bg-size', 'cover');
                document.documentElement.style.setProperty('--body-bg-position', 'center');
            };
            const check = (url) => fetch(url, { method: 'HEAD' }).then(r => r.ok ? url : null).catch(() => null);
            const load = () => {
                const mobile = `/body_bg_mobile.png?t=${Date.now()}`, desktop = `/body_bg.png?t=${Date.now()}`;
                const pref = isMobile ? mobile : desktop;
                check(pref).then(f => f ? apply(f) : (isMobile ? check(desktop).then(f => f && apply(f)) : null));
            };
            load();
            let t; window.addEventListener('resize', () => {
                clearTimeout(t); t = setTimeout(() => { if ((window.innerWidth <= 640) !== isMobile) load(); }, 250);
            });
        }

        // ========================================
        // ✅ 目录功能核心模块
        // ========================================

        // 生成唯一ID（用于锚点）
        function generateSlug(text) {
            return text.toLowerCase()
                .replace(/[^\w\u4e00-\u9fa5\s-]/g, '').trim()
                .replace(/\s+/g, '-').replace(/-+/g, '-');
        }

        // 解析bio内容，生成目录数据
        function parseTocFromBio(bioContent, config) {
            const { min_level = 2, max_level = 4 } = config;
            const parser = new DOMParser();
            const doc = parser.parseFromString(bioContent, 'text/html');
            const headings = doc.querySelectorAll(`h${min_level}, h${min_level + 1}, h${max_level}`);
            const toc = [];
            headings.forEach(h => {
                const level = parseInt(h.tagName[1]);
                if (level < min_level || level > max_level) return;
                const text = h.textContent.trim();
                if (!text) return;
                const id = h.id || generateSlug(text);
                if (!h.id) h.id = id;
                toc.push({ id, text, level });
            });
            return toc;
        }

        // 渲染目录列表
        function renderTocList(items, isModal = false) {
            if (!items.length) return '<p style="color:var(--text-light);font-size:0.85rem">暂无目录</p>';
            return `<ul class="toc-list">
    ${items.map(item => `
      <li class="toc-item">
        <a href="#${item.id}" class="toc-link level-${item.level}"
           onclick="scrollToSection('${item.id}'); ${isModal ? 'closeTocModal();' : ''} return false;">
          ${escapeHtml(item.text)}
        </a>
      </li>`).join('')}
  </ul>`;
        }

        // 初始化目录功能
        function initToc(info, bioHtml) {
            const tocConfig = info.toc;
            if (!tocConfig?.enabled || !bioHtml) return;
            const tocItems = parseTocFromBio(bioHtml, tocConfig);
            if (!tocItems.length) return;
            const isMobile = window.innerWidth <= 768;
            injectTocContainers(tocItems, isMobile);
            initTocScrollSpy(tocItems);
            window.addEventListener('resize', () => {
                const newIsMobile = window.innerWidth <= 768;
                if (newIsMobile !== isMobile) location.reload();
            });
        }

        // 注入目录HTML结构
        function injectTocContainers(items, isMobile) {
            if (isMobile) {
                document.body.insertAdjacentHTML('beforeend', `
      <button class="toc-toggle-btn" id="toc-toggle" aria-label="目录" onclick="toggleTocModal()">☰</button>
      <div class="toc-overlay" id="toc-overlay" onclick="closeTocModal()"></div>
      <div class="toc-modal" id="toc-modal">
        <div class="toc-modal-header">
          <h4>📑 目录</h4>
          <button class="toc-modal-close" onclick="closeTocModal()">✕</button>
        </div>
        ${renderTocList(items, true)}
      </div>`);
                document.getElementById('toc-toggle')?.classList.add('visible');
            } else {
                const container = document.createElement('nav');
                container.className = 'toc-sidebar visible';
                container.id = 'toc-sidebar';
                container.innerHTML = `
      <div class="toc-title">📑 目录
        <button class="toc-toggle-btn" onclick="toggleTocCollapse(event)" aria-label="折叠目录"></button>
      </div>
      ${renderTocList(items, false)}`;
                container.onclick = (e) => {
                    if (container.classList.contains('collapsed') && !e.target.closest('.toc-toggle-btn')) {
                        toggleTocCollapse(e);
                    }
                };
                document.body.appendChild(container);
                if (localStorage.getItem('toc_collapsed') === 'true') {
                    container.classList.add('collapsed');
                }
            }
        }

        // 切换电脑端目录折叠状态
        function toggleTocCollapse(e) {
            if (e) e.stopPropagation();
            const sidebar = document.getElementById('toc-sidebar');
            if (!sidebar) return;
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('toc_collapsed', sidebar.classList.contains('collapsed'));
        }

        // 手机端：切换目录弹窗
        function toggleTocModal() {
            const modal = document.getElementById('toc-modal');
            const overlay = document.getElementById('toc-overlay');
            const btn = document.getElementById('toc-toggle');
            if (modal.classList.contains('visible')) { closeTocModal(); }
            else {
                modal.classList.add('visible'); overlay.classList.add('visible');
                btn?.classList.add('active'); document.body.style.overflow = 'hidden';
            }
        }

        // 关闭目录弹窗
        function closeTocModal() {
            document.getElementById('toc-modal')?.classList.remove('visible');
            document.getElementById('toc-overlay')?.classList.remove('visible');
            document.getElementById('toc-toggle')?.classList.remove('active');
            document.body.style.overflow = '';
        }

        // 平滑滚动到章节
        function scrollToSection(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const headerOffset = 80;
            const elementPosition = el.getBoundingClientRect().top + window.scrollY;
            const offsetPosition = elementPosition - headerOffset;
            window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            if (window.innerWidth <= 768) closeTocModal();
        }

        // 滚动监听：高亮当前目录项
        function initTocScrollSpy(items) {
            const links = document.querySelectorAll('.toc-link');
            if (!links.length) return;
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        links.forEach(link => {
                            link.classList.toggle('active', link.getAttribute('href') === `#${id}`);
                        });
                    }
                });
            }, { rootMargin: '-50% 0px -45% 0px', threshold: 0 });
            items.forEach(item => {
                const el = document.getElementById(item.id);
                if (el) observer.observe(el);
            });
        }
    </script>
</body>

</html>
